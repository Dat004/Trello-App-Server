# Ping Render /api/health on a schedule so free-tier dynos stay warm.
# Required repo secret: RENDER_HEALTH_URL
# Example: https://your-api.onrender.com/api/health

name: Keep Render Awake

on:
  schedule:
    # Every 10 minutes — free tier sleeps after ~15m idle
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Wake API
        env:
          RENDER_HEALTH_URL: ${{ secrets.RENDER_HEALTH_URL }}
        run: |
          if [ -z "$RENDER_HEALTH_URL" ]; then
            echo "Missing secret RENDER_HEALTH_URL — skip (set it in repo Settings → Secrets)."
            exit 0
          fi
          echo "Pinging $RENDER_HEALTH_URL"
          for i in 1 2 3 4 5; do
            if curl -fsS --max-time 45 "$RENDER_HEALTH_URL"; then
              echo ""
              echo "OK (attempt $i)"
              exit 0
            fi
            echo "Attempt $i failed; retrying..."
            sleep 5
          done
          echo "Health check failed after retries"
          exit 1
